# 主要配置
spring:
  profiles:
    active: "${PROFILE_ACTIVE:fs}"
  servlet:
    multipart:
      max-file-size: 12MB
      max-request-size: 12MB
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

server:
  port: 8801
  tomcat:
    max-http-form-post-size: 12MB

####### 以下是FileLift相关核心配置 #######
io:
  github:
    swsk33:
      file-lift:
        core:
          # 上传文件最大限制为10240KB，即10MB
          # 不配置该选项表示不对文件大小做限制
          size-limit: 10240
          # 不允许同名文件上传覆盖
          override: false
          # 开启文件上传后自动命名功能
          auto-rename: true
          # 使用时间字符串对文件自动命名
          auto-rename-format: "time"
          # 允许上传的文件格式，这里表示允许jpg、png和无扩展名的文件上传
          # 不配置该选项表示允许任何格式文件上传
          allowed-formats:
            - "jpg"
            - "png"
            - "?"